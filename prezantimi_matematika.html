<!DOCTYPE html>
<html lang="sq">
<head>
    <meta charset="UTF-8">
    <title>Vizualizimi i Kompleksitetit Big O</title>
    <script src="https://cdn.plot.ly/plotly-latest.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 20px; background: #f4f7f6; }
        .container { max-width: 1000px; margin: auto; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h2 { color: #2c3e50; text-align: center; }
        .controls { display: flex; align-items: center; justify-content: center; gap: 20px; margin-bottom: 20px; padding: 15px; background: #e9ecef; border-radius: 8px; }
        input[type=range] { width: 300px; cursor: pointer; }
        .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(120px, 1fr)); gap: 10px; margin-top: 20px; text-align: center; }
        .stat-card { padding: 10px; background: #fff; border: 1px solid #ddd; border-radius: 6px; font-size: 0.9em; }
        .stat-card b { display: block; color: #e67e22; font-size: 1.1em; }
    </style>
</head>
<body>

<div class="container">
    <h2>Krahasimi i Kompleksitetit Big O - Matematikë Diskrete</h2>
    
    <div class="controls">
        <label><b>Rrit vlerën e n:</b> <span id="nVal">10</span></label>
        <input type="range" id="nSlider" min="1" max="50" value="10" oninput="updateChart()">
    </div>

    <div id="chart"></div>

    <div class="stats" id="statsContainer">
        </div>
</div>

<script>
function factorial(num) {
    if (num < 0) return 0;
    if (num === 0) return 1;
    let res = 1;
    for (let i = 1; i <= num; i++) res *= i;
    return res;
}

function updateChart() {
    let nMax = parseInt(document.getElementById('nSlider').value);
    document.getElementById('nVal').innerText = nMax;

    let xValues = Array.from({length: nMax}, (_, i) => i + 1);
    
    let data = [
        { x: xValues, y: xValues.map(x => 1), name: 'O(1)', line: {color: '#3498db', width: 3} },
        { x: xValues, y: xValues.map(x => Math.log2(x)), name: 'O(log n)', line: {color: '#27ae60'} },
        { x: xValues, y: xValues.map(x => x), name: 'O(n)', line: {color: '#f1c40f'} },
        { x: xValues, y: xValues.map(x => x * Math.log2(x)), name: 'O(n log n)', line: {color: '#e67e22'} },
        { x: xValues, y: xValues.map(x => Math.pow(x, 2)), name: 'O(n²)', line: {color: '#e74c3c'} },
        { x: xValues, y: xValues.map(x => Math.pow(2, x)), name: 'O(2ⁿ)', line: {color: '#9b59b6'} },
        { x: xValues, y: xValues.map(x => factorial(x)), name: 'O(n!)', line: {color: '#34495e'} }
    ];

    let layout = {
        title: 'Rritja e Funksioneve (n = ' + nMax + ')',
        xaxis: { title: 'Madhësia e Inputit (n)' },
        yaxis: { title: 'Operacionet', type: 'log', autorange: true },
        margin: { t: 50 },
        hovermode: 'closest'
    };

    Plotly.newPlot('chart', data, layout);

    // Përditëso tabelën e vlerave poshtë
    let lastN = nMax;
    let statsHTML = `
        <div class="stat-card">O(1) <b>1</b></div>
        <div class="stat-card">O(log n) <b>${Math.log2(lastN).toFixed(2)}</b></div>
        <div class="stat-card">O(n) <b>${lastN}</b></div>
        <div class="stat-card">O(n log n) <b>${(lastN * Math.log2(lastN)).toFixed(2)}</b></div>
        <div class="stat-card">O(n²) <b>${Math.pow(lastN, 2)}</b></div>
        <div class="stat-card">O(2ⁿ) <b>${Math.pow(2, lastN).toExponential(2)}</b></div>
        <div class="stat-card">O(n!) <b>${factorial(lastN).toExponential(2)}</b></div>
    `;
    document.getElementById('statsContainer').innerHTML = statsHTML;
}

// Inicializimi i parë
updateChart();
</script>

</body>
</html>
